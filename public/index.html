<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Todo App</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px;display:flex;justify-content:center;align-items:center}.container{width:100%;max-width:600px;background:#fff;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.15);overflow:hidden}.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:30px 20px;text-align:center}.header h1{font-size:2.5em;margin-bottom:8px}.header p{opacity:.9;font-size:.95em}.content{padding:30px 20px}.input-section{display:flex;gap:10px;margin-bottom:30px}#todoInput{flex:1;padding:12px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:1em;transition:border-color .3s}#todoInput:focus{outline:0;border-color:#667eea}#addBtn{padding:12px 24px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;transition:transform .2s,box-shadow .2s}#addBtn:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(102,126,234,.4)}#addBtn:active{transform:translateY(0)}#todoList{list-style:none}.todo-item{display:flex;align-items:center;gap:15px;padding:15px;background:#f9f9f9;border-radius:8px;margin-bottom:10px;transition:all .3s;border-left:4px solid #667eea}.todo-item:hover{background:#f0f0f0;box-shadow:0 2px 8px rgba(0,0,0,.1)}.todo-item.completed{opacity:.6;border-left-color:#4caf50}.todo-item.completed .todo-text{text-decoration:line-through;color:#999}.todo-checkbox{width:20px;height:20px;cursor:pointer;accent-color:#667eea}.todo-text{flex:1;font-size:1em;color:#333}.delete-btn{padding:8px 12px;background:#ff6b6b;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600;transition:background .3s}.delete-btn:hover{background:#ff5252}.empty-state{text-align:center;padding:40px 20px;color:#999}.empty-state p{font-size:1.1em;margin-bottom:10px}.loading{text-align:center;padding:20px;color:#667eea;font-weight:600}.error{background:#ffebee;color:#c62828;padding:15px;border-radius:8px;margin-bottom:20px;border-left:4px solid #c62828}.success{background:#e8f5e9;color:#2e7d32;padding:15px;border-radius:8px;margin-bottom:20px;border-left:4px solid #4caf50}.todo-count{text-align:center;color:#999;font-size:.9em;margin-top:20px;padding-top:20px;border-top:1px solid #e0e0e0}@media (max-width:600px){.header h1{font-size:1.8em}.input-section{flex-direction:column}#addBtn{width:100%}}</style></head><body><div class="container"><div class="header"><h1>📝 Todo App</h1><p>Stay organized and productive</p></div><div class="content"><div id="messageContainer"></div><div class="input-section"><input type="text" id="todoInput" placeholder="Add a new todo..." autocomplete="off"><button id="addBtn">Add</button></div><div id="loadingContainer" class="loading" style="display:none">Loading todos...</div><ul id="todoList"></ul><div id="emptyState" class="empty-state" style="display:none"><p>✨ No todos yet!</p><p>Create your first todo to get started.</p></div><div class="todo-count"><span id="todoCount">0</span> todos</div></div></div><script>const API_URL='/api';const todoInput=document.getElementById('todoInput');const addBtn=document.getElementById('addBtn');const todoList=document.getElementById('todoList');const emptyState=document.getElementById('emptyState');const loadingContainer=document.getElementById('loadingContainer');const messageContainer=document.getElementById('messageContainer');const todoCount=document.getElementById('todoCount');document.addEventListener('DOMContentLoaded',loadTodos);addBtn.addEventListener('click',addTodo);todoInput.addEventListener('keypress',(e)=>{if(e.key==='Enter')addTodo()});async function loadTodos(){loadingContainer.style.display='block';try{const response=await fetch(`${API_URL}/todos`);const result=await response.json();if(result.status==='success'){renderTodos(result.data);loadingContainer.style.display='none'}else showError('Failed to load todos')}catch(error){console.error('Error:',error);showError('Error loading todos');loadingContainer.style.display='none'}}function renderTodos(todos){todoList.innerHTML='';if(todos.length===0){emptyState.style.display='block';todoCount.textContent='0';return}emptyState.style.display='none';todoCount.textContent=todos.length;todos.forEach(todo=>{const li=document.createElement('li');li.className=`todo-item ${todo.completed?'completed':''}`;li.innerHTML=`<input type="checkbox" class="todo-checkbox" ${todo.completed?'checked':''} onchange="toggleTodo(${todo.id},this.checked)"><span class="todo-text">${escapeHtml(todo.title)}</span><button class="delete-btn" onclick="deleteTodo(${todo.id})">Delete</button>`;todoList.appendChild(li)})}async function addTodo(){const title=todoInput.value.trim();if(!title){showError('Please enter a todo title');return}try{const response=await fetch(`${API_URL}/todos`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,description:''})});const result=await response.json();if(result.status==='success'){todoInput.value='';loadTodos();showSuccess('Todo added')}else showError(result.message||'Failed')}catch(error){console.error('Error:',error);showError('Error adding todo')}}async function toggleTodo(id,completed){try{const response=await fetch(`${API_URL}/todos/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({completed})});const result=await response.json();if(result.status==='success')loadTodos();else{showError('Failed');loadTodos()}}catch(error){console.error('Error:',error);showError('Error');loadTodos()}}async function deleteTodo(id){if(!confirm('Delete this todo?'))return;try{const response=await fetch(`${API_URL}/todos/${id}`,{method:'DELETE'});const result=await response.json();if(result.status==='success'){loadTodos();showSuccess('Deleted')}else showError('Failed')}catch(error){console.error('Error:',error);showError('Error')}}function showError(message){const div=document.createElement('div');div.className='error';div.textContent=message;messageContainer.innerHTML='';messageContainer.appendChild(div);setTimeout(()=>div.remove(),4000)}function showSuccess(message){const div=document.createElement('div');div.className='success';div.textContent=message;messageContainer.innerHTML='';messageContainer.appendChild(div);setTimeout(()=>div.remove(),3000)}function escapeHtml(text){const div=document.createElement('div');div.textContent=text;return div.innerHTML}</script></body></html>
